<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MLO Store</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0d0d12; color: #fff; margin: 0; padding: 20px; }
        .view { display: none; } /* إخفاء الكل افتراضياً */
        .active { display: block; } /* إظهار الواجهة النشطة */
        .header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #333; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; background: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">MLO Store</div>
        <nav>
            <button onclick="showView('storeView')">المتجر</button>
            <button onclick="showView('sellerAuthView')">بوابة التجار</button>
        </nav>
    </header>

    <!-- واجهة المتجر -->
    <div id="storeView" class="view active">
        <h1>مرحباً بك في المتجر</h1>
        <p>هنا ستظهر المنتجات...</p>
    </div>

    <!-- واجهة دخول التجار -->
    <div id="sellerAuthView" class="view">
        <h1>دخول التجار</h1>
        <input type="text" id="user" placeholder="اليوزر">
        <button onclick="login()">دخول</button>
    </div>

    <!-- واجهة لوحة تحكم التاجر -->
    <div id="sellerDashboardView" class="view">
        <h1>لوحة تحكم التاجر</h1>
        <button onclick="showView('storeView')">خروج</button>
    </div>

    <script>
        // دالة التبديل الذكية
        function showView(viewId) {
            // 1. إخفاء جميع الواجهات
            const views = document.querySelectorAll('.view');
            views.forEach(view => view.classList.remove('active'));

            // 2. إظهار الواجهة المطلوبة فقط
            const target = document.getElementById(viewId);
            if (target) {
                target.classList.add('active');
            }
        }

        // دالة تجريبية للدخول
        function login() {
            alert("تم تسجيل الدخول!");
            showView('sellerDashboardView');
        }
    </script>
</body>
</html>
